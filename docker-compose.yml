version: "3.9"

services:
  backend:
    build: .

    container_name: task-manager-backend

    ports:
      - "5000:5000"

    volumes:
      - .:/app
      - /app/node_modules

    depends_on:
      - mongodb

    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/taskmanager
      - JWT_SECRET=supersecretkey

  mongodb:
    image: mongo

    container_name: task-manager-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: